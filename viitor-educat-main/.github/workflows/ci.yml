name: CI/CD Pipeline

on:
  push:
    branches: [main, deploy]
  pull_request:
    branches: [main, deploy]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: viitor-educat-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: viitor-educat-main
        run: npm ci

      - name: Install backend dependencies
        working-directory: viitor-educat-main/backend
        run: npm ci

      - name: Lint frontend
        working-directory: viitor-educat-main
        run: npm run lint

      - name: Type check frontend
        working-directory: viitor-educat-main
        run: npx tsc --noEmit

      - name: Type check backend
        working-directory: viitor-educat-main/backend
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: viitortest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: viitor-educat-main/package-lock.json

      - name: Install dependencies
        working-directory: viitor-educat-main
        run: npm ci

      - name: Install backend dependencies
        working-directory: viitor-educat-main/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: viitor-educat-main/backend
        run: npx prisma generate

      - name: Push schema to test DB
        working-directory: viitor-educat-main/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/viitortest?schema=public
        run: npx prisma db push --skip-generate

      - name: Run frontend tests
        working-directory: viitor-educat-main
        run: npm run test

      - name: Run backend tests
        working-directory: viitor-educat-main/backend
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: viitor-educat-main/package-lock.json

      - name: Install dependencies
        working-directory: viitor-educat-main
        run: npm ci

      - name: Install backend dependencies
        working-directory: viitor-educat-main/backend
        run: npm ci

      - name: Build frontend
        working-directory: viitor-educat-main
        run: npm run build

      - name: Build backend
        working-directory: viitor-educat-main/backend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: viitor-educat-main/dist
          retention-days: 1

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: viitor-educat-main/backend/dist
          retention-days: 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./viitor-educat-main
          push: false
          tags: obscuron:latest
          load: true

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build]
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy')

    steps:
      - name: Send Discord notification
        uses: sarisia/actions-status-discord@v1
        if: vars.DISCORD_WEBHOOK != ''
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: "❌ CI failed"
          description: "One or more CI jobs failed on ${{ github.ref_name }}. Check the Actions tab for details."
          color: 0xff4444